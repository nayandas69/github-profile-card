version: 2

updates:
  # Node / pnpm dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
      time: "02:00"
      timezone: UTC
    open-pull-requests-limit: 5
    reviewers:
      - nayandas69
    labels:
      - dependencies
      - auto-update
    commit-message:
      prefix: "chore"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    versioning-strategy: auto
    rebase-strategy: auto
    allow:
      - dependency-type: production
      - dependency-type: development
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions updates
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: UTC
    open-pull-requests-limit: 5
    reviewers:
      - nayandas69
    labels:
      - ci
      - github-actions
    commit-message:
      prefix: "ci"
      include: "scope"
