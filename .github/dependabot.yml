version: 2

updates:
  # Node / pnpm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "02:00"
      timezone: "UTC"

    open-pull-requests-limit: 5

    reviewers:
      - "nayandas69"

    assignees:
      - "nayandas69"

    labels:
      - "dependencies"
      - "auto-update"

    commit-message:
      prefix: "chore(deps)"
      include: "scope"

    pull-request-branch-name:
      separator: "/"

    versioning-strategy: "increase"
    rebase-strategy: "auto"

    allow:
      - dependency-type: "direct"

    groups:
      hono:
        patterns:
          - "hono"
          - "@hono/*"

      upstash:
        patterns:
          - "@upstash/*"

      tooling:
        patterns:
          - "typescript"
          - "tsx"
          - "vitest"
          - "prettier"
          - "@types/*"

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "03:00"
      timezone: "UTC"

    reviewers:
      - "nayandas69"

    assignees:
      - "nayandas69"

    labels:
      - "ci"
      - "github-actions"

    commit-message:
      prefix: "chore(ci)"
      include: "scope"

    pull-request-branch-name:
      separator: "/"

    rebase-strategy: "auto"
